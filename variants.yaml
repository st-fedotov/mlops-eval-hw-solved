# A variant is the full configuration of one deployed assistant.
# Adding/comparing variants is the unit of MLflow runs and of dashboards in Grafana.
#
# Field reference:
#   model           : main assistant model + sampling config
#   system_prompt   : path to the system-prompt text file
#   guardrail.type  : "none" | "input_classifier" | "sandwich"
#   guardrail.<...> : per-type config; classifier/validator each carry their own model + prompt

v1:
  display_name: "Baseline"
  description: "Minimal Emeli baseline; no guardrails."
  model:
    name: meta-llama/Meta-Llama-3.1-8B-Instruct
    temperature: 0.0
    max_tokens: 512
  system_prompt: prompts/v1_baseline.txt
  guardrail:
    type: none

v2:
  display_name: "Explicit refusal"
  description: "Positive-list scope + canned refusal string."
  model:
    name: meta-llama/Meta-Llama-3.1-8B-Instruct
    temperature: 0.0
    max_tokens: 512
  system_prompt: prompts/v2_explicit_refusal.txt
  guardrail:
    type: none

v3:
  display_name: "Prompt hardening (foil; don't do this in prod)"
  description: "Long anti-jailbreak rules in system prompt. Kept as a foil to show prompt-engineering plateaus."
  model:
    name: meta-llama/Meta-Llama-3.1-8B-Instruct
    temperature: 0.0
    max_tokens: 512
  system_prompt: prompts/v3_prompt_hardening.txt
  guardrail:
    type: none

v4:
  display_name: "Input classifier gate"
  description: "v2 prompt with a cheap input-classifier guarding the assistant."
  model:
    name: meta-llama/Meta-Llama-3.1-8B-Instruct
    temperature: 0.0
    max_tokens: 512
  system_prompt: prompts/v2_explicit_refusal.txt
  guardrail:
    type: input_classifier
    classifier:
      model:
        name: meta-llama/Meta-Llama-3.1-8B-Instruct
        temperature: 0.0
        max_tokens: 8
      prompt: prompts/classifier_input.txt

v5:
  display_name: "Sandwich (input + output validator)"
  description: "Input classifier in front + output validator behind. Defense in depth."
  model:
    name: meta-llama/Meta-Llama-3.1-8B-Instruct
    temperature: 0.0
    max_tokens: 512
  system_prompt: prompts/v2_explicit_refusal.txt
  guardrail:
    type: sandwich
    input_classifier:
      model:
        name: meta-llama/Meta-Llama-3.1-8B-Instruct
        temperature: 0.0
        max_tokens: 8
      prompt: prompts/classifier_input.txt
    output_validator:
      model:
        name: meta-llama/Meta-Llama-3.1-8B-Instruct
        temperature: 0.0
        max_tokens: 8
      prompt: prompts/classifier_output.txt
