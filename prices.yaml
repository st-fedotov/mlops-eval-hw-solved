# Per-model token prices for Nebius Token Factory.
#
# HAND-MAINTAINED.
#
# Nebius does not expose per-token rates via a programmatic API. Their
# completion responses return token counts but not dollars (same shape as
# every other OpenAI-compatible provider), and their operator-facing rates
# UI (https://tokenfactory.nebius.com/organization/prices) is auth-gated.
# When prices change, edit this file — code does not need to change.
#
# Verify periodically against:
#   - https://nebius.com/token-factory/prices  (login required for live rates)
#   - https://pricepertoken.com/endpoints/compare/nebius-vs-openrouter
#     (third-party aggregator; structured table; useful as a sanity check)
#
# Last verified: 2026-05-20
# Source for the values below: pricepertoken.com aggregator (3rd-party).
#
# Schema: list of rows, each {model, input_per_1m_usd, output_per_1m_usd}.
# `model` MUST match the model id Nebius returns from GET /v1/models
# (use `python scripts/list_models.py` to see the canonical ids).
#
# If a model used in configs/ is missing from this file, the cost counter
# will under-report (logged as a warning at first use).

prices:
